name: Security Baseline

# Sources:
# - GitHub Secret Scanning: https://docs.github.com/en/code-security/secret-scanning
# - Gitleaks default rules: https://github.com/gitleaks/gitleaks
# - TruffleHog detectors: https://github.com/trufflesecurity/trufflehog
# - GitHub Actions reusable workflows: https://docs.github.com/en/actions/sharing-automations/reusing-workflows

on:
  workflow_call:
    inputs:
      language:
        description: "primary language: node | python | any"
        required: false
        type: string
        default: "any"
      allowed_author_name:
        description: "public commit/package author name"
        required: false
        type: string
        default: "veris"
      allowed_author_email:
        description: "public commit/package author email"
        required: false
        type: string
        default: "hello@veris.kr"

jobs:
  security-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Public git identity check
        run: |
          ALLOWED_NAME='${{ inputs.allowed_author_name }}'
          ALLOWED_EMAIL='${{ inputs.allowed_author_email }}'
          BAD=0

          # Check the pushed commit range when GitHub provides it; fall back to HEAD.
          if [ -n "${{ github.event.before }}" ] && git cat-file -e "${{ github.event.before }}" 2>/dev/null; then
            RANGE="${{ github.event.before }}..${{ github.sha }}"
          else
            RANGE="HEAD"
          fi

          while IFS='|' read -r SHA NAME EMAIL; do
            [ -n "$SHA" ] || continue
            if [ "$NAME" != "$ALLOWED_NAME" ] || [ "$EMAIL" != "$ALLOWED_EMAIL" ]; then
              echo "::error::Non-public git identity on ${SHA}: ${NAME} <${EMAIL}>. Expected ${ALLOWED_NAME} <${ALLOWED_EMAIL}>"
              BAD=1
            fi
          done < <(git log --format='%h|%an|%ae' "$RANGE")

          if [ "$BAD" -ne 0 ]; then
            exit 1
          fi
          echo "git identity check: ${ALLOWED_NAME} <${ALLOWED_EMAIL}> âś“"

      - name: Credential scan
        run: |
          # Patterns sourced from GitHub Secret Scanning + Gitleaks default ruleset.
          PATTERN="(
            ghp_[A-Za-z0-9]{36}|
            ghs_[A-Za-z0-9]{36}|
            gho_[A-Za-z0-9]{36}|
            github_pat_[A-Za-z0-9_]{82}|
            sk-[A-Za-z0-9]{20,}|
            sk-ant-api03-[A-Za-z0-9_-]{93}|
            AIza[A-Za-z0-9_-]{35}|
            AKIA[A-Z0-9]{16}|
            AGPA[A-Z0-9]{16}|
            AROA[A-Z0-9]{16}|
            hf_[A-Za-z0-9]{34,}|
            sk_live_[A-Za-z0-9]{24,}|
            pk_live_[A-Za-z0-9]{24,}|
            xoxb-[0-9]{11,}-[0-9]{11,}-[A-Za-z0-9]{24}|
            xoxa-2-[A-Za-z0-9_-]{80,}|
            SG\.[A-Za-z0-9_-]{22}\.[A-Za-z0-9_-]{43}|
            AC[a-z0-9]{32}|SK[a-z0-9]{32}|
            npm_[A-Za-z0-9]{36,}|
            -----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY( BLOCK)?-----
          )"
          CLEAN_PATTERN=$(echo "$PATTERN" | tr -d '[:space:]')

          if grep -rn \
            --include="*.py" --include="*.js" --include="*.ts" --include="*.mjs" \
            --include="*.json" --include="*.yaml" --include="*.yml" \
            --include="*.env" --include="*.sh" --include="*.toml" \
            --exclude-dir=".git" --exclude-dir="node_modules" \
            --exclude-dir="dist" --exclude-dir=".venv" --exclude-dir="__pycache__" \
            -E "$CLEAN_PATTERN" . 2>/dev/null; then
            echo "::error::Credential pattern found in source"
            exit 1
          fi
          echo "credential scan: clean âś“"

      - name: Personal info scan
        run: |
          # Local user paths. Personal author identity is enforced by the git/package author guards.
          if grep -rn \
            --include="*.py" --include="*.js" --include="*.ts" \
            --include="*.json" --include="*.yaml" --include="*.md" --include="*.toml" \
            --exclude-dir=".git" --exclude-dir="node_modules" \
            --exclude-dir="dist" --exclude-dir=".venv" \
            -E "(/Users/[a-zA-Z0-9_-]+|/home/[a-zA-Z0-9_-]+/)" \
            . 2>/dev/null; then
            echo "::error::Local user path found in tracked files"
            exit 1
          fi
          echo "personal info scan: clean âś“"

      - name: Package author guard
        run: |
          ALLOWED_NAME='${{ inputs.allowed_author_name }}'
          ALLOWED_EMAIL='${{ inputs.allowed_author_email }}'

          if [ -f package.json ]; then
            node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); const expected=process.env.ALLOWED_NAME+' <'+process.env.ALLOWED_EMAIL+'>'; let author=pkg.author; if(author&&typeof author==='object') author=(author.name||'')+' <'+(author.email||'')+'>'; if(!author){console.error('::error::package.json author is missing. Expected '+expected); process.exit(1)} if(author!==expected){console.error('::error::package.json author is '+author+'. Expected '+expected); process.exit(1)} console.log('package.json author guard: '+expected+' âś“')"
          fi

          if [ -f pyproject.toml ]; then
            python3 -c "import os,sys,tomllib; expected_name=os.environ['ALLOWED_NAME']; expected_email=os.environ['ALLOWED_EMAIL']; data=tomllib.load(open('pyproject.toml','rb')); authors=data.get('project',{}).get('authors',[]); bad=[a for a in authors if a.get('name')!=expected_name or a.get('email')!=expected_email]; print(f'pyproject.toml author guard: {expected_name} <{expected_email}> âś“') if authors and not bad else None; (print(f'::error::pyproject.toml authors must be {expected_name} <{expected_email}>') or sys.exit(1)) if bad else None"
          fi
        env:
          ALLOWED_NAME: ${{ inputs.allowed_author_name }}
          ALLOWED_EMAIL: ${{ inputs.allowed_author_email }}

      - name: Database URL with credentials check
        run: |
          # Embedded credentials in connection strings.
          if grep -rn \
            --include="*.py" --include="*.js" --include="*.ts" \
            --include="*.json" --include="*.yaml" --include="*.toml" \
            --exclude-dir=".git" --exclude-dir="node_modules" \
            --exclude-dir="dist" --exclude-dir=".venv" \
            -E "(postgresql|mysql|mongodb(\+srv)?|redis|amqp)://[^:@\s]+:[^@\s]+@" \
            . 2>/dev/null; then
            echo "::error::Database URL with embedded credentials found"
            exit 1
          fi
          echo "database URL scan: clean âś“"

      - name: Sensitive file exposure check
        run: |
          # Catch accidentally tracked sensitive files.
          for pattern in "^\.env$" "^\.env\." "^secrets\.json$" "^credentials\.json$" \
                         "^id_rsa$" "^id_ed25519$" "^id_ecdsa$" "^.*\.pem$" "^.*\.key$" \
                         "^.*\.p12$" "^.*\.pfx$" "^service_account.*\.json$"; do
            if git ls-files | grep -qE "$pattern"; then
              echo "::error::Sensitive file tracked by git: $(git ls-files | grep -E "$pattern")"
              exit 1
            fi
          done
          echo "sensitive file check: clean âś“"

      - name: .gitignore guard
        run: |
          # Warn if common sensitive patterns are missing from .gitignore.
          MISSING=""
          for pattern in ".env" ".env.local" "*.pem" "*.key" "secrets.json" \
                         "node_modules/" ".venv/" "__pycache__/" "*.p12" "*.pfx"; do
            if ! grep -qF "$pattern" .gitignore 2>/dev/null; then
              MISSING="$MISSING\n  â€˘ $pattern"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::warning::.gitignore missing recommended patterns:$MISSING"
          else
            echo ".gitignore guard: OK âś“"
          fi

      - name: Notify profile README to update
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.PROFILE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "PROFILE_DISPATCH_TOKEN not set â€” skipping profile README update"
            exit 0
          fi
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/verisworks-ai/verisworks-ai/dispatches \
            -d '{"event_type":"repo-added"}' && echo "profile dispatch sent âś“" || echo "profile dispatch failed (non-fatal)"
